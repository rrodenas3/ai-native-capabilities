name: Eval Suite — All Capabilities

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  core-tests:
    name: Core Infrastructure Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_native_test
        ports: ["5432:5432"]
      redis:
        image: redis:7
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - run: python scripts/setup_db.py --test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost/ai_native_test
          REDIS_URL: redis://localhost:6379
      - run: pytest core/tests/ -v --tb=short
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost/ai_native_test
          REDIS_URL: redis://localhost:6379
          EVAL_MODE: mock

  cap-01-evals:
    name: Cap-01 Decision Intelligence Evals
    needs: core-tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_native_test
        ports: ["5432:5432"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - run: python scripts/setup_db.py --test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost/ai_native_test
      - name: Run Cap-01 Eval Suite
        run: python cap-01-decision-intelligence/evals/suite.py --output reports/cap01.json
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost/ai_native_test
          LLM_MODE: mock
          EVAL_MODE: ci
      - name: Check Gates
        run: python scripts/check_eval_gates.py reports/cap01.json --capability cap-01
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cap01-eval-report
          path: reports/cap01.json

  cap-02-evals:
    name: Cap-02 Agentic Engineering Evals
    needs: core-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run Cap-02 Eval Suite
        run: python cap-02-agentic-engineering/evals/suite.py --output reports/cap02.json
        env:
          LLM_MODE: mock
          EVAL_MODE: ci
      - name: Security Gate Check
        run: python scripts/check_eval_gates.py reports/cap02.json --capability cap-02
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cap02-eval-report
          path: reports/cap02.json

  cap-03-evals:
    name: Cap-03 Agentic Commerce Evals
    needs: core-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run Cap-03 Eval Suite
        run: python cap-03-agentic-commerce/evals/suite.py --output reports/cap03.json
        env:
          LLM_MODE: mock
          EVAL_MODE: ci
      - name: Check Gates
        run: python scripts/check_eval_gates.py reports/cap03.json --capability cap-03
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cap03-eval-report
          path: reports/cap03.json

  cap-04-evals:
    name: Cap-04 Autonomous Operations Evals
    needs: core-tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_native_test
        ports: ["5432:5432"]
      redis:
        image: redis:7
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - run: python scripts/setup_db.py --test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost/ai_native_test
      - name: Generate Synthetic Supply Chain Data
        run: python cap-04-autonomous-operations/tests/fixtures/generate_data.py
      - name: Run Cap-04 Eval Suite
        run: python cap-04-autonomous-operations/evals/suite.py --output reports/cap04.json
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost/ai_native_test
          LLM_MODE: mock
          EVAL_MODE: ci
          AUTONOMOUS_ACTION_THRESHOLD_USD: 5000
      - name: Check Gates (Human Approval Coverage is blocking)
        run: python scripts/check_eval_gates.py reports/cap04.json --capability cap-04
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cap04-eval-report
          path: reports/cap04.json

  cap-05-evals:
    name: Cap-05 Compliance Intelligence Evals
    needs: core-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run Cap-05 Eval Suite
        run: python cap-05-compliance-intelligence/evals/suite.py --output reports/cap05.json
        env:
          LLM_MODE: mock
          EVAL_MODE: ci
      - name: Check Gates (false_negative_rate is blocking)
        run: python scripts/check_eval_gates.py reports/cap05.json --capability cap-05
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cap05-eval-report
          path: reports/cap05.json

  eval-summary:
    name: Eval Summary Report
    needs: [cap-01-evals, cap-02-evals, cap-03-evals, cap-04-evals, cap-05-evals]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: reports/
      - run: pip install rich tabulate
      - run: python scripts/eval_summary.py reports/
      - name: Comment PR with eval results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('reports/summary.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
